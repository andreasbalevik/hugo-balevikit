  phone = '+47 95 12 77 23'
  orgnr = '925316504'
  keywords = ['nettsider Vestland', 'lage nettside Vestland', 'nettsider for bedrifter Vestland', 'utvikle nettside Vestland', 'IT-konsultasjon Vestland', 'nettside pris Vestland', 'IT-tjenester Vestland', 'statiske nettsider Norge', 'nettside fra 3500 kr']
