<section id="kontakt" class="bg-primary/2">
    <div class="container">
        <div class="text-center mb-16">
            <h2 class="text-2xl md:text-3xl lg:text-4xl font-medium leading-[1.2] tracking-[-0.015em] text-balance mt-0 mb-6 text-primary">Ta kontakt</h2>
            <p class="text-lg leading-relaxed text-pretty max-w-2xl mx-auto">Fortell hva du trenger – vi svarer raskt på spørsmål om pris og hva som er mulig.</p>
        </div>

        <div class="max-w-2xl mx-auto bg-white border border-primary/20 rounded-lg shadow-sm p-8 md:p-12 text-center">
            <div class="space-y-8">
                <div>
                    <p class="text-sm text-gray-700 uppercase tracking-widest mb-3">E-post</p>
                    <a href="mailto:{{ .Site.Params.email }}" class="text-xl font-semibold text-primary hover:text-primary/80 transition-colors break-all rounded focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">
                        {{ .Site.Params.email }}
                    </a>
                </div>

                <div class="border-t border-primary/20 pt-8">
                    <p class="text-sm text-gray-700 uppercase tracking-widest mb-3">Telefon</p>
                    <a href="tel:{{ .Site.Params.phone | replaceRE `\s` `` }}" class="text-xl font-semibold text-primary hover:text-primary/80 transition-colors rounded focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">
                        {{ .Site.Params.phone }}
                    </a>
                </div>

                <div class="border-t border-primary/20 pt-8">
                    <p class="text-sm text-gray-700 uppercase tracking-widest mb-3">Organisasjonsnummer</p>
                    <p class="text-lg md:text-xl font-medium">{{ .Site.Params.orgnr }}</p>
                </div>
            </div>
        </div>
    </div>
</section>
