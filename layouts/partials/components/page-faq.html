{{/* Renders FAQ answers on service pages so readers and search engines see the same key answers. */}}
{{ with .Params.faq }}
<section class="mt-16 border-t border-primary/15 pt-12">
  <div class="max-w-3xl">
    <h2 class="text-2xl md:text-3xl font-medium leading-[1.2] tracking-[-0.015em] text-balance mt-0 mb-6 text-primary">Vanlige spørsmål</h2>
    <div class="border-y border-primary/15 divide-y divide-primary/15">
      {{ range . }}
      <details class="group py-6">
        <summary class="flex items-start justify-between gap-6 list-none cursor-pointer rounded text-left text-lg font-medium leading-relaxed focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary [&::-webkit-details-marker]:hidden">
          <span>{{ .question }}</span>
          <span class="text-primary text-2xl leading-none transition-transform duration-200 group-open:rotate-45" aria-hidden="true">+</span>
        </summary>
        <p class="mt-4 max-w-prose text-base leading-relaxed text-gray-700">{{ .answer }}</p>
      </details>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
