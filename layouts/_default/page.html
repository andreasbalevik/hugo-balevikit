{{ define "main" }}

<div class="container">
  <article>

    <h1 class="text-3xl md:text-4xl lg:text-5xl font-medium leading-[1.2] tracking-[-0.015em] text-balance mt-0 mb-6">
      {{ .Title }}
    </h1>

    {{- with .Params.description }}
    <p class="text-xl leading-relaxed text-pretty text-gray-700 mb-6">{{ . }}</p>
    {{- end }}

    {{- if not .Date.IsZero }}
    <p class="text-base text-gray-700 mb-8">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format "2. January 2006" }}</time>
    </p>
    {{- end }}

    {{ partial "components/prose-content.html" . }}
    {{ partial "components/page-faq.html" . }}

  </article>
</div>

{{ end }}
