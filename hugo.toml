baseURL = 'https://balevikit.no/'
languageCode = 'nb-NO'
title = 'Balevik IT & Service'
theme = 'balevikit-tailwindcss-hugo-theme'

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

[params]
  description = 'Fast pris, rask levering og enkle nettsider for bedrifter i Vestland.'
