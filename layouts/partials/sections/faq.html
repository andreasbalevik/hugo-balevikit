{{ with .Params.faq }}
<section id="faq" class="bg-white">
    <div class="container">
        <div class="text-center mb-16">
            <h2 class="text-2xl md:text-3xl lg:text-4xl font-medium leading-[1.2] tracking-[-0.015em] text-balance mt-0 mb-6 text-primary">Vanlige spørsmål</h2>
            <p class="text-lg leading-relaxed text-pretty max-w-2xl mx-auto">Korte svar på det de fleste lurer på.</p>
        </div>

        <div class="max-w-3xl mx-auto border-y border-primary/15 divide-y divide-primary/15">
            {{ range . }}
            <details class="group py-6">
                <summary class="flex items-start justify-between gap-6 list-none cursor-pointer rounded text-left text-lg font-medium leading-relaxed focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary [&::-webkit-details-marker]:hidden">
                    <span>{{ .question }}</span>
                    <span class="text-primary text-2xl leading-none transition-transform duration-200 group-open:rotate-45" aria-hidden="true">+</span>
                </summary>
                <p class="mt-4 max-w-prose text-base leading-relaxed text-gray-700">{{ .answer }}</p>
            </details>
            {{ end }}
        </div>
    </div>
</section>
{{ end }}
